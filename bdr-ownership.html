<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BDR ownership dashboard for tracking account ownership, open ARR, and won/lost performance by BDR."
    />
    <title>BDR PULSE | BDR Ownership</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <header class="topbar">
        <div class="brand-block">
          <h1>BDR PULSE</h1>
        </div>
        <div class="top-actions">
          <nav class="page-nav" aria-label="Primary">
            <a class="page-link" href="./index.html">Overview</a>
            <a class="page-link is-active" href="./bdr-ownership.html">BDR Ownership</a>
            <a class="page-link" href="./account-ledger.html">Account Ledger</a>
          </nav>
          <a class="top-link" href="#" aria-label="Open Salesforce workspace">Salesforce</a>
        </div>
      </header>

      <main class="ledger-layout">
        <section class="panel panel-compact">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Search & Filter</p>
              <h2>Search and refine ownership view</h2>
            </div>
          </div>
          <div class="toolbar toolbar-wide">
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="Search account, lead, BDR, stage, source, or status"
            />
            <select id="ownerFilter">
              <option value="All">BDR name</option>
            </select>
            <select id="sourceFilter">
              <option value="All">Sources</option>
              <option value="Inbound">Inbound</option>
              <option value="Outbound">Outbound</option>
              <option value="Partner">Partner</option>
              <option value="Event">Event</option>
            </select>
            <select id="stageFilter">
              <option value="All">Opportunity stage</option>
            </select>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">BDR Ownership</p>
              <h2>Managers view</h2>
            </div>
          </div>
          <div id="leaderboard" class="leaderboard"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
